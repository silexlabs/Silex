<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test CSS Variables</title>
  <link href="https://unpkg.com/grapesjs/dist/css/grapes.min.css" rel="stylesheet">
  <script src="https://unpkg.com/grapesjs"></script>
  <script src="https://unpkg.com/grapesjs-preset-webpage"></script>
  <style>
    body,
    html {
      margin: 0;
      height: 100%;
    }

    .grapesjs-css-variables select {
      background-color: #352d2f;
      color: #b9a5a6;
      padding: 5px;
      border: none;
    }

    .grapesjs-css-variables input,
    .grapesjs-css-variables button {
      background-color: #352d2f;
      color: #b9a5a6;
      padding: 5px;
      border: none;
    }

    .grapesjs-css-variables .silex-bar {
      display: flex;
    }

    .grapesjs-css-variables .silex-bar>* {
      margin: 5px;
    }

    .grapesjs-css-variables button {
      padding: 5px;
      margin: 5px;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <div id='basic-actions' class="panel__basic-actions" style="z-index: 9; left: 120px;"></div>
  <div id="gjs">
    <div style="padding: 20px;">
      <h1>CSS Variables Demo</h1>
      <p>Click the "Open CSS Variables" button to define design tokens.</p>
      <div style="padding: 20px; margin: 10px 0;">Box 1</div>
      <div style="padding: 20px; margin: 10px 0;">Box 2</div>
    </div>
  </div>
  <script type="text/javascript">
      window.addEventListener('load', () => {
        var editor = grapesjs.init({
          container: '#gjs',
          fromElement: true,
          height: '100%',
          storageManager: { autoload: 0 },
          plugins: ['grapesjs-preset-webpage', '@silexlabs/grapesjs-css-variables'],
          pluginsOpts: {
            'gjs-preset-webpage': {
              modalImportTitle: 'Import Template',
              modalImportButton: 'Import',
              modalImportLabel: '',
              modalImportContent: '',
              importViewerOptions: {},
            },
            '@silexlabs/grapesjs-css-variables': {},
          }
        });
        editor.on("load", () => {
          editor.Panels.addPanel({
            id: "basic-actions",
            el: ".panel__basic-actions",
            buttons: [
              {
                id: "create-button",
                label: "Open CSS Variables",
                command(editor) {
                  editor.runCommand("open-css-variables");
                }
              }
            ]
          });
        })
      })
  </script>
</body>
</html>
