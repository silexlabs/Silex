name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JS: build + lint + unit tests ────────────────────────────────
  js:
    name: build / lint / test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Force LF line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # pnpm via action-setup AFTER setup-node so its standalone binary wins in PATH
      # over node's bundled corepack shim (whose signing keys are stale and break
      # `pnpm` invocations). No cache:pnpm — it would call corepack during setup-node.
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      # App only (--filter): the grapesjs-plugins are workspace packages with their
      # own heavy devDeps (grapesjs-cli, playwright), not needed to build/lint/test
      # the Silex app. They get their own job below. Matches the Dockerfile.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @silexlabs/silex

      - name: Build (single package)
        run: pnpm build

      - name: Verify build output
        run: |
          for f in dist/client/js/main.*.js dist/client/index.html dist/client/css/admin.*.css \
                   dist/server/server/index.js; do
            [ -f "$f" ] || { echo "::error::missing build output $f"; exit 1; }
          done

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  # ── Rust: server-rust library ────────────────────────────────────
  rust:
    name: rust (server-rust)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Check
        run: cargo check -p silex-server

      - name: Clippy (informational; pre-existing lints not yet enforced)
        run: cargo clippy -p silex-server

      - name: Test
        run: cargo test -p silex-server

  # ── grapesjs-plugins: build + lint + test each plugin (workspace) ────
  # Enforced gate: each plugin must build, lint and test green. This is where the
  # plugins get linted/tested, NOT in the git pre-commit hook (kept fast, app-only).
  plugins:
    name: grapesjs-plugins
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      # Full workspace install (plugin devDeps: grapesjs-cli, web-test-runner, …)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Browsers for the web-test-runner / lit plugins (e.g. expression-input)
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Build plugins
        run: pnpm build:plugins

      - name: Lint plugins
        run: pnpm lint:plugins

      - name: Test plugins
        run: pnpm test:plugins
