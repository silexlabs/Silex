name: preinstall guard (Windows)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout (top-level submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.13.0

      - name: Enable Corepack + Yarn
        shell: bash
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate
          yarn --version

      - name: Git longpaths
        shell: bash
        run: git config --global core.longpaths true

      - name: Yarn install (skip builds)
        shell: bash
        run: |
          rm -rf node_modules
          yarn install --mode=skip-build --no-immutable

      - name: preinstall passes under yarn
        shell: bash
        run: yarn run preinstall

      - name: preinstall fails under npm
        shell: bash
        run: |
          if npm run preinstall; then
            echo "Expected npm run preinstall to fail, but it succeeded."
            exit 1
          fi
          echo "npm run preinstall failed as expected"