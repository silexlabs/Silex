name: preinstall guard (Windows)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout (top-level submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.13.0

      - name: Enable Corepack + Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate
          yarn --version

      - name: Git longpaths
        run: git config --global core.longpaths true

      - name: Yarn install (skip builds)
        run: |
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
          yarn install --mode=skip-build --no-immutable

      - name: preinstall passes under yarn
        run: yarn run preinstall

      - name: preinstall fails under npm
        run: |
          npm run preinstall
          $code = $LASTEXITCODE
          if ($code -eq 0) { throw "Expected npm run preinstall to fail, but it succeeded." }
          Write-Host "npm run preinstall failed as expected (exit code $code)"
          exit 0

