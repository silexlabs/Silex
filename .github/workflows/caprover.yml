name: Deploy to CapRover

# Deploys the server image (root Dockerfile, referenced by the root
# captain-definition) to CapRover. CapRover tars the repo and builds the Dockerfile.
#
# Required secrets:
#   CAPROVER_SERVER        e.g. https://captain.your-domain.com
#   CAPROVER_APP_CANARY    canary app name        + CAPROVER_APP_TOKEN_CANARY
#   CAPROVER_APP_PROD      production app name     + CAPROVER_APP_TOKEN_PROD

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  canary:
    name: deploy canary
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Deploy to CapRover (canary)
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ secrets.CAPROVER_APP_CANARY }}
          token: ${{ secrets.CAPROVER_APP_TOKEN_CANARY }}

  production:
    name: deploy production
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, 'canary') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Deploy to CapRover (production)
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ secrets.CAPROVER_APP_PROD }}
          token: ${{ secrets.CAPROVER_APP_TOKEN_PROD }}
