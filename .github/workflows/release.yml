name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build silex-server + silex-desktop per platform ──────────────
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            server-artifact: silex-server-linux-amd64
            desktop-artifact: silex-desktop-linux
            binary: silex-server
          - platform: macos
            os: macos-latest
            server-artifact: silex-server-macos-amd64
            desktop-artifact: silex-desktop-macos
            binary: silex-server
          - platform: windows
            os: windows-latest
            server-artifact: silex-server-windows-amd64
            desktop-artifact: silex-desktop-windows
            binary: silex-server.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Enable Corepack (provides yarn)
        run: corepack enable

      - name: Use npm registry (yarnpkg.com has intermittent 500s)
        run: yarn config set registry https://registry.npmjs.org

      - name: Install JS dependencies and build frontend
        run: yarn install --ignore-scripts && yarn run build

      # ── silex-server (single binary with embedded frontend) ─────
      - name: Build silex-server
        run: cargo build --release -p silex-server --features embed-frontend

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.server-artifact }}
          path: target/release/${{ matrix.binary }}
          retention-days: 5

      # ── silex-desktop (Tauri) ────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/silex-desktop
          tauriScript: yarn tauri

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.desktop-artifact }}
          path: |
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.app
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.sig
            target/release/bundle/**/*.tar.gz
            target/release/bundle/**/*.zip

  # ── Create GitHub release on tag push ────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p release
          # Server binaries
          cp artifacts/silex-server-linux-amd64/silex-server   release/silex-server-linux-amd64
          cp artifacts/silex-server-macos-amd64/silex-server   release/silex-server-macos-amd64
          cp artifacts/silex-server-windows-amd64/silex-server.exe release/silex-server-windows-amd64.exe
          # Desktop installers
          cp artifacts/silex-desktop-linux/**/*.deb  release/ 2>/dev/null || true
          cp artifacts/silex-desktop-linux/**/*.rpm  release/ 2>/dev/null || true
          cp artifacts/silex-desktop-macos/**/*.dmg  release/ 2>/dev/null || true
          cp artifacts/silex-desktop-windows/**/*.exe release/ 2>/dev/null || true
          # Updater artifacts (signed archives)
          cp artifacts/silex-desktop-linux/**/*.tar.gz     release/ 2>/dev/null || true
          cp artifacts/silex-desktop-linux/**/*.tar.gz.sig release/ 2>/dev/null || true
          cp artifacts/silex-desktop-macos/**/*.tar.gz     release/ 2>/dev/null || true
          cp artifacts/silex-desktop-macos/**/*.tar.gz.sig release/ 2>/dev/null || true
          cp artifacts/silex-desktop-windows/**/*.zip      release/ 2>/dev/null || true
          cp artifacts/silex-desktop-windows/**/*.zip.sig  release/ 2>/dev/null || true

          # Build latest.json for the updater
          BASE="https://github.com/${REPO}/releases/download/${VERSION}"
          VER="${VERSION#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Find platform-specific updater files by naming convention
          LINUX_TAR=$(ls release/*_amd64.tar.gz 2>/dev/null | head -1)
          LINUX_SIG=$(cat "${LINUX_TAR}.sig" 2>/dev/null || echo "")
          MACOS_TAR=$(ls release/*.app.tar.gz 2>/dev/null | head -1)
          MACOS_SIG=$(cat "${MACOS_TAR}.sig" 2>/dev/null || echo "")
          WINDOWS_ZIP=$(ls release/*_x64-setup*.zip 2>/dev/null | head -1)
          WINDOWS_SIG=$(cat "${WINDOWS_ZIP}.sig" 2>/dev/null || echo "")

          cat > release/latest.json << EOF
          {
            "version": "${VER}",
            "pub_date": "${DATE}",
            "platforms": {
              "linux-x86_64": {
                "url": "${BASE}/$(basename "${LINUX_TAR}" 2>/dev/null)",
                "signature": "${LINUX_SIG}"
              },
              "darwin-aarch64": {
                "url": "${BASE}/$(basename "${MACOS_TAR}" 2>/dev/null)",
                "signature": "${MACOS_SIG}"
              },
              "windows-x86_64": {
                "url": "${BASE}/$(basename "${WINDOWS_ZIP}" 2>/dev/null)",
                "signature": "${WINDOWS_SIG}"
              }
            }
          }
          EOF

          ls -lh release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
