name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build silex-server + silex-desktop per platform ──────────────
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            server-artifact: silex-server-linux-amd64
            binary: silex-server
            archive: tar.gz
          - os: macos-latest
            server-artifact: silex-server-macos-amd64
            binary: silex-server
            archive: tar.gz
          - os: windows-latest
            server-artifact: silex-server-windows-amd64
            binary: silex-server.exe
            archive: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Enable Corepack (provides yarn)
        run: corepack enable

      - name: Install JS dependencies and build frontend
        run: yarn install --ignore-scripts && yarn run build

      # ── silex-server ─────────────────────────────────────────────
      - name: Build silex-server
        run: cargo build --release -p silex-server

      - name: Package server (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging/client
          cp target/release/${{ matrix.binary }} staging/
          cp -r packages/silex-lib/dist/client/* staging/client/
          echo 'SILEX_STATIC_ROUTES=/:./client' > staging/.env
          tar -czf ${{ matrix.server-artifact }}.tar.gz -C staging .

      - name: Package server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging/client
          Copy-Item target/release/${{ matrix.binary }} staging/
          Copy-Item -Recurse packages/silex-lib/dist/client/* staging/client/
          Set-Content -Path staging/.env -Value 'SILEX_STATIC_ROUTES=/:./client'
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.server-artifact }}.zip

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.server-artifact }}
          path: ${{ matrix.server-artifact }}.${{ matrix.archive }}
          retention-days: 5

      # ── silex-desktop (Tauri) ────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/silex-desktop
          tauriScript: yarn tauri

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: silex-desktop-${{ matrix.os }}
          path: |
            packages/silex-desktop/src-tauri/target/release/bundle/**/*.dmg
            packages/silex-desktop/src-tauri/target/release/bundle/**/*.app
            packages/silex-desktop/src-tauri/target/release/bundle/**/*.deb
            packages/silex-desktop/src-tauri/target/release/bundle/**/*.AppImage
            packages/silex-desktop/src-tauri/target/release/bundle/**/*.msi
            packages/silex-desktop/src-tauri/target/release/bundle/**/*.exe

  # ── Create GitHub release on tag push ────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/silex-server-*/*
            artifacts/silex-desktop-*/**/*
