name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build silex-server + silex-desktop per platform ──────────────
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            server-artifact: silex-server-linux-amd64
            binary: silex-server
          - os: macos-latest
            server-artifact: silex-server-macos-amd64
            binary: silex-server
          - os: windows-latest
            server-artifact: silex-server-windows-amd64
            binary: silex-server.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Enable Corepack (provides yarn)
        run: corepack enable

      - name: Use npm registry (yarnpkg.com has intermittent 500s)
        run: yarn config set registry https://registry.npmjs.org

      - name: Install JS dependencies and build frontend
        run: yarn install --ignore-scripts && yarn run build

      # ── silex-server (single binary with embedded frontend) ─────
      - name: Build silex-server
        run: cargo build --release -p silex-server --features embed-frontend

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.server-artifact }}
          path: target/release/${{ matrix.binary }}
          retention-days: 5

      # ── silex-desktop (Tauri) ────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/silex-desktop
          tauriScript: yarn tauri

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: silex-desktop-${{ matrix.os }}
          path: |
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.app
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe

  # ── Create GitHub release on tag push ────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/silex-server-*/*
            artifacts/silex-desktop-*/**/*
