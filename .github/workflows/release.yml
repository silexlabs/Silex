name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build silex-server + silex-desktop per platform ──────────────
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            binary: silex-server
          - platform: macos-arm
            os: macos-latest
            binary: silex-server
          - platform: macos-x64
            os: macos-latest
            rust-target: x86_64-apple-darwin
            binary: silex-server
          - platform: windows
            os: windows-latest
            binary: silex-server.exe

    steps:
      # Prevent CRLF conversion on Windows (eslint requires LF)
      - name: Force LF line endings
        run: git config --global core.autocrlf false

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf


      # Patch the desktop version from the tag BEFORE any Tauri build so every
      # bundle (and the updater metadata) carries the release version — no
      # stale 0.1.0 artifacts from intermediate builds.
      - name: Patch desktop version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          jq --arg v "$V" '.version = $v' desktop/src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json desktop/src-tauri/tauri.conf.json
          echo "Desktop version set to $V"

      - name: Install JS dependencies and build frontend
        shell: bash
        run: pnpm install --frozen-lockfile && pnpm run build

      # Fail early if the frontend wasn't built (prevents broken embedded assets)
      - name: Verify frontend was built
        shell: bash
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "::error::Frontend build failed — dist/client/index.html not found"
            exit 1
          fi

      # ── silex-desktop (Tauri) ────────────────────────────────────
      # Build Tauri first — it compiles silex-server as a library dependency.
      # The standalone server build below reuses the cached compilation.
      # Sign updater artifacts only on tag pushes (secrets unavailable on fork PRs).
      - name: Build Tauri app (signed)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GLITCHTIP_DSN: ${{ secrets.GLITCHTIP_DSN }}
        with:
          projectPath: desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.rust-target && format('--target {0}', matrix.rust-target) || '' }}

      # Write a temp config to disable updater artifacts (they require signing keys)
      - name: Disable updater artifacts config
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: echo '{"bundle":{"createUpdaterArtifacts":false}}' > desktop/tauri.ci.json

      - name: Build Tauri app (unsigned)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLITCHTIP_DSN: ${{ secrets.GLITCHTIP_DSN }}
        with:
          projectPath: desktop
          tauriScript: pnpm tauri
          args: --config tauri.ci.json ${{ matrix.rust-target && format('--target {0}', matrix.rust-target) || '' }}

      # target/release/bundle/ for native builds, target/<triple>/release/bundle/ for cross-builds.
      # The ** glob covers both paths without duplication.
      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: silex-desktop-${{ matrix.platform }}
          path: |
            target/**/release/bundle/**/*.dmg
            target/**/release/bundle/**/*.AppImage
            target/**/release/bundle/**/*.deb
            target/**/release/bundle/**/*.rpm
            target/**/release/bundle/**/*.exe
            target/**/release/bundle/**/*.sig
            target/**/release/bundle/**/*.tar.gz
            target/**/release/bundle/**/*.zip

      # ── silex-server (single binary with embedded frontend) ─────
      # Built after Tauri to reuse the compiled silex-server library.
      - name: Build silex-server
        run: cargo build --release -p silex-server --features embed-frontend ${{ matrix.rust-target && format('--target {0}', matrix.rust-target) || '' }}

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: silex-server-${{ matrix.platform }}
          path: target/**/release/${{ matrix.binary }}
          retention-days: 5

  # ── Create GitHub release on tag push ────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Find previous tag
        id: prev_tag
        run: |
          # Find the previous tag of the same type (prerelease or stable)
          CURRENT="${GITHUB_REF_NAME}"
          if [[ "$CURRENT" == *-* ]]; then
            # Prerelease: find previous prerelease tag
            PREV=$(git tag --sort=-version:refname | grep -E '^v.*-' | grep -v "^${CURRENT}$" | head -1)
          else
            # Stable: find previous stable tag
            PREV=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${CURRENT}$" | head -1)
          fi
          echo "tag=${PREV:-}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV:-none}"

      - name: Generate release notes
        id: changelog
        run: |
          PREV="${{ steps.prev_tag.outputs.tag }}"
          if [[ -n "$PREV" ]]; then
            BODY=$(./scripts/generate-changelog.sh "${PREV}..${GITHUB_REF_NAME}")
          else
            BODY="## What's Changed"$'\n\n'"First release!"
          fi
          # Write to file (multiline output)
          echo "$BODY" > release-notes.md
          cat release-notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p release

          # Server binaries — find inside artifact dirs (upload preserves target/ path)
          find artifacts/silex-server-linux   -name 'silex-server' -type f -exec cp {} release/silex-server-linux-amd64 \;
          find artifacts/silex-server-macos-arm -name 'silex-server' -type f -exec cp {} release/silex-server-macos-arm64 \;
          find artifacts/silex-server-macos-x64 -name 'silex-server' -type f -exec cp {} release/silex-server-macos-x64 \;
          find artifacts/silex-server-windows -name 'silex-server.exe' -type f -exec cp {} release/silex-server-windows-amd64.exe \;

          # Desktop installers + updater artifacts (flatten into release/).
          # Tauri v2 updater artifacts are the bundles themselves + .sig:
          # Linux = .AppImage, macOS = .app.tar.gz, Windows = -setup.exe.
          # NB: deb staging dirs contain control.tar.gz/data.tar.gz — not matched here.
          find artifacts/silex-desktop-* -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*-setup.exe' \
               -o -name '*.AppImage' -o -name '*.AppImage.sig' -o -name '*-setup.exe.sig' \
               -o -name '*.AppImage.tar.gz' -o -name '*.AppImage.tar.gz.sig' \) \
            -exec cp {} release/ \;

          # macOS updater bundles are named Silex.app.tar.gz on both arches —
          # rename per-arch while copying so they don't overwrite each other.
          # Cross-builds leave an unsigned native bundle next to the signed
          # target one: only pick a bundle that has its .sig sibling.
          V="${VERSION#v}"
          for pair in "macos-arm aarch64" "macos-x64 x64"; do
            set -- $pair
            SRC=$(find "artifacts/silex-desktop-$1" -name '*.app.tar.gz' ! -name '*.sig' \
                  | while read -r f; do [ -f "$f.sig" ] && echo "$f" && break; done)
            if [ -n "$SRC" ]; then
              cp "$SRC" "release/Silex_${V}_$2.app.tar.gz"
              cp "$SRC.sig" "release/Silex_${V}_$2.app.tar.gz.sig"
            fi
          done

          # Helper: find file + read its .sig
          sig() { cat "$1.sig" 2>/dev/null || echo ""; }

          # Build latest.json for the Tauri updater (v2 artifact names)
          BASE="https://github.com/${REPO}/releases/download/${VERSION}"
          LINUX_BUNDLE=$(find release -name '*_amd64.AppImage' ! -name '*.sig' | head -1)
          [ -z "$LINUX_BUNDLE" ] && LINUX_BUNDLE=$(find release -name '*_amd64.AppImage.tar.gz' ! -name '*.sig' | head -1)
          MACOS_ARM_BUNDLE=$(find release -name '*_aarch64.app.tar.gz' ! -name '*.sig' | head -1)
          MACOS_X64_BUNDLE=$(find release -name '*_x64.app.tar.gz' ! -name '*.sig' | head -1)
          WINDOWS_BUNDLE=$(find release -name '*_x64-setup.exe' ! -name '*.sig' | head -1)

          # Fail loudly if an updater bundle is missing — an empty URL in
          # latest.json silently breaks auto-update for that platform.
          for f in "$LINUX_BUNDLE" "$MACOS_ARM_BUNDLE" "$MACOS_X64_BUNDLE" "$WINDOWS_BUNDLE"; do
            if [ -z "$f" ] || [ -z "$(sig "$f")" ]; then
              echo "::error::Missing updater bundle or signature (linux='$LINUX_BUNDLE' macos-arm='$MACOS_ARM_BUNDLE' macos-x64='$MACOS_X64_BUNDLE' windows='$WINDOWS_BUNDLE')"
              exit 1
            fi
          done

          jq -n \
            --arg ver   "${VERSION#v}" \
            --arg date  "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg lu    "${BASE}/$(basename "$LINUX_BUNDLE")" \
            --arg ls    "$(sig "$LINUX_BUNDLE")" \
            --arg mau   "${BASE}/$(basename "$MACOS_ARM_BUNDLE")" \
            --arg mas   "$(sig "$MACOS_ARM_BUNDLE")" \
            --arg mxu   "${BASE}/$(basename "$MACOS_X64_BUNDLE")" \
            --arg mxs   "$(sig "$MACOS_X64_BUNDLE")" \
            --arg wu    "${BASE}/$(basename "$WINDOWS_BUNDLE")" \
            --arg ws    "$(sig "$WINDOWS_BUNDLE")" \
            '{
              version: $ver, pub_date: $date,
              platforms: {
                "linux-x86_64":    { url: $lu,  signature: $ls },
                "darwin-aarch64":  { url: $mau, signature: $mas },
                "darwin-x86_64":   { url: $mxu, signature: $mxs },
                "windows-x86_64":  { url: $wu,  signature: $ws }
              }
            }' > release/latest.json

          echo "--- latest.json ---"
          cat release/latest.json
          echo "--- release files ---"
          ls -lh release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: true
          prerelease: ${{ contains(github.ref_name, 'canary') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: release/*
