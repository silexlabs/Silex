name: Docker image

# Builds and publishes the silexlabs/silex-platform image (root Dockerfile) —
# the same image used by v3.silex.me and the CapRover one-click app. Single source of
# truth, replacing the legacy silexlabs/silex-platform repo autobuild.
# Requires repo/org secrets DOCKER_USERNAME / DOCKER_PASSWORD.

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: build and push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute version
        id: tags
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            silexlabs/silex-platform:${{ steps.tags.outputs.version }}
            silexlabs/silex-platform:latest
