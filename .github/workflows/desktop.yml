name: Desktop release

# Builds the Silex Desktop (Tauri) app and publishes its GitHub release + updater feed.
# Desktop has its own version line, released on demand via `desktop-v*` tags — so a
# server release (v*) never ships a desktop update. GitHub Releases are desktop-only,
# so the updater endpoint (releases/latest/download/latest.json) always resolves to the
# latest published desktop release.
#   push main / PR → unsigned build (CI smoke test)
#   tag desktop-v* → signed build + draft GitHub release (publish it to ship the update)

on:
  push:
    branches: [main]
    tags: ['desktop-v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: macos-arm
            os: macos-latest
          - platform: macos-x64
            os: macos-latest
            rust-target: x86_64-apple-darwin
          - platform: windows
            os: windows-latest

    steps:
      # Prevent CRLF conversion on Windows (eslint requires LF)
      - name: Force LF line endings
        run: git config --global core.autocrlf false

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # pnpm after setup-node so its standalone binary wins over node's corepack shim
      # (stale signing keys); no cache:pnpm to avoid corepack during setup-node.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Patch the desktop version from the tag before the Tauri build, so the bundles and
      # updater metadata carry the release version (Tauri reads it from tauri.conf.json;
      # a stale value would nag users to "update" to the same version).
      - name: Patch desktop version from tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#desktop-v}"
          jq --arg v "$V" '.version = $v' desktop/src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json desktop/src-tauri/tauri.conf.json
          ACTUAL="$(jq -r '.version' desktop/src-tauri/tauri.conf.json)"
          if [ "$ACTUAL" != "$V" ]; then
            echo "::error::Desktop version not patched (expected '$V', got '$ACTUAL')"; exit 1
          fi
          echo "Desktop version set to $V"

      # silex-desktop needs its deps (@tauri-apps/cli) installed for the Tauri build.
      - name: Install JS dependencies and build frontend
        shell: bash
        run: pnpm install --frozen-lockfile --filter @silexlabs/silex --filter @silexlabs/silex-desktop && pnpm run build

      - name: Verify frontend was built
        shell: bash
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "::error::Frontend build failed — dist/client/index.html not found"
            exit 1
          fi

      # Sign updater artifacts only on desktop-v* tags (secrets unavailable on fork PRs).
      - name: Build Tauri app (signed)
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GLITCHTIP_DSN: ${{ secrets.GLITCHTIP_DSN }}
        with:
          projectPath: desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.rust-target && format('--target {0}', matrix.rust-target) || '' }}

      - name: Disable updater artifacts config
        if: ${{ !startsWith(github.ref, 'refs/tags/desktop-v') }}
        shell: bash
        run: echo '{"bundle":{"createUpdaterArtifacts":false}}' > desktop/tauri.ci.json

      - name: Build Tauri app (unsigned)
        if: ${{ !startsWith(github.ref, 'refs/tags/desktop-v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLITCHTIP_DSN: ${{ secrets.GLITCHTIP_DSN }}
        with:
          projectPath: desktop
          tauriScript: pnpm tauri
          args: --config tauri.ci.json ${{ matrix.rust-target && format('--target {0}', matrix.rust-target) || '' }}

      # target/release/bundle/ for native builds, target/<triple>/release/bundle/ for cross-builds.
      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: silex-desktop-${{ matrix.platform }}
          path: |
            target/**/release/bundle/**/*.dmg
            target/**/release/bundle/**/*.AppImage
            target/**/release/bundle/**/*.deb
            target/**/release/bundle/**/*.rpm
            target/**/release/bundle/**/*.exe
            target/**/release/bundle/**/*.sig
            target/**/release/bundle/**/*.tar.gz
            target/**/release/bundle/**/*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Find previous tag
        id: prev_tag
        run: |
          # Previous desktop tag of the same type (prerelease or stable)
          CURRENT="${GITHUB_REF_NAME}"
          if [[ "$CURRENT" == *-* ]]; then
            PREV=$(git tag --sort=-version:refname | grep -E '^desktop-v.*-' | grep -v "^${CURRENT}$" | head -1)
          else
            PREV=$(git tag --sort=-version:refname | grep -E '^desktop-v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${CURRENT}$" | head -1)
          fi
          echo "tag=${PREV:-}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV:-none}"

      - name: Generate release notes
        id: changelog
        run: |
          PREV="${{ steps.prev_tag.outputs.tag }}"
          if [[ -n "$PREV" ]]; then
            BODY=$(./scripts/generate-changelog.sh "${PREV}..${GITHUB_REF_NAME}")
          else
            BODY="## What's Changed"$'\n\n'"First release!"
          fi
          echo "$BODY" > release-notes.md
          cat release-notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: silex-desktop-*

      - name: Prepare release files
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p release

          # Desktop installers + updater artifacts (flatten into release/).
          # Tauri v2 updater artifacts are the bundles themselves + .sig:
          # Linux = .AppImage, macOS = .app.tar.gz, Windows = -setup.exe.
          find artifacts/silex-desktop-* -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*-setup.exe' \
               -o -name '*.AppImage' -o -name '*.AppImage.sig' -o -name '*-setup.exe.sig' \
               -o -name '*.AppImage.tar.gz' -o -name '*.AppImage.tar.gz.sig' \) \
            -exec cp {} release/ \;

          # macOS updater bundles are named Silex.app.tar.gz on both arches — rename per-arch.
          # Cross-builds leave an unsigned native bundle next to the signed one: pick only
          # the bundle that has its .sig sibling.
          V="${VERSION#desktop-v}"
          for pair in "macos-arm aarch64" "macos-x64 x64"; do
            set -- $pair
            SRC=$(find "artifacts/silex-desktop-$1" -name '*.app.tar.gz' ! -name '*.sig' \
                  | while read -r f; do [ -f "$f.sig" ] && echo "$f" && break; done)
            if [ -n "$SRC" ]; then
              cp "$SRC" "release/Silex_${V}_$2.app.tar.gz"
              cp "$SRC.sig" "release/Silex_${V}_$2.app.tar.gz.sig"
            fi
          done

          sig() { cat "$1.sig" 2>/dev/null || echo ""; }

          BASE="https://github.com/${REPO}/releases/download/${VERSION}"
          LINUX_BUNDLE=$(find release -name '*_amd64.AppImage' ! -name '*.sig' | head -1)
          [ -z "$LINUX_BUNDLE" ] && LINUX_BUNDLE=$(find release -name '*_amd64.AppImage.tar.gz' ! -name '*.sig' | head -1)
          MACOS_ARM_BUNDLE=$(find release -name '*_aarch64.app.tar.gz' ! -name '*.sig' | head -1)
          MACOS_X64_BUNDLE=$(find release -name '*_x64.app.tar.gz' ! -name '*.sig' | head -1)
          WINDOWS_BUNDLE=$(find release -name '*_x64-setup.exe' ! -name '*.sig' | head -1)

          # Fail loudly if an updater bundle is missing — an empty URL silently breaks auto-update.
          for f in "$LINUX_BUNDLE" "$MACOS_ARM_BUNDLE" "$MACOS_X64_BUNDLE" "$WINDOWS_BUNDLE"; do
            if [ -z "$f" ] || [ -z "$(sig "$f")" ]; then
              echo "::error::Missing updater bundle or signature (linux='$LINUX_BUNDLE' macos-arm='$MACOS_ARM_BUNDLE' macos-x64='$MACOS_X64_BUNDLE' windows='$WINDOWS_BUNDLE')"
              exit 1
            fi
          done

          jq -n \
            --arg ver   "$V" \
            --arg date  "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg lu    "${BASE}/$(basename "$LINUX_BUNDLE")" \
            --arg ls    "$(sig "$LINUX_BUNDLE")" \
            --arg mau   "${BASE}/$(basename "$MACOS_ARM_BUNDLE")" \
            --arg mas   "$(sig "$MACOS_ARM_BUNDLE")" \
            --arg mxu   "${BASE}/$(basename "$MACOS_X64_BUNDLE")" \
            --arg mxs   "$(sig "$MACOS_X64_BUNDLE")" \
            --arg wu    "${BASE}/$(basename "$WINDOWS_BUNDLE")" \
            --arg ws    "$(sig "$WINDOWS_BUNDLE")" \
            '{
              version: $ver, pub_date: $date,
              platforms: {
                "linux-x86_64":    { url: $lu,  signature: $ls },
                "darwin-aarch64":  { url: $mau, signature: $mas },
                "darwin-x86_64":   { url: $mxu, signature: $mxs },
                "windows-x86_64":  { url: $wu,  signature: $ws }
              }
            }' > release/latest.json

          echo "--- latest.json ---"
          cat release/latest.json
          echo "--- release files ---"
          ls -lh release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: true
          prerelease: ${{ contains(github.ref_name, 'canary') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: release/*
